{% load static %} 
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
</head>

<style>
  body {
    /*background-color:rgb(247, 247, 211);*/
    background-image: url("{% static 'images/12.jpg' %}");
    background-repeat: no-repeat; 
    background-size: cover;
    background-position: center; 
    background-attachment: fixed;
  }
</style>

<body>
    <nav class="navbar navbar-expand-lg " style="background-color:white">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="{% static 'images/imagen.png' %}" width="50" height="50">
            </a>
            <a class="nav-link" aria-current="page" href="/" style="font-family: Verdana, Geneva, Tahoma, sans-serif; color: black;"><strong>I.E. Santísima <br>Virgen De Guadalupe</strong></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="/" style="font-family: Verdana, Geneva, Tahoma, sans-serif; font-size: 20px; margin-right: 30px; color: black; transition: color .18s ease;"onmouseover="this.style.color='green';"onmouseout="this.style.color='';"><strong>Página Principal</strong></a>
                    </li>
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="/tasks" style="font-family: Verdana, Geneva, Tahoma, sans-serif; font-size: 20px; margin-right: 30px; color: black; transition: color .18s ease;"onmouseover="this.style.color='green';"onmouseout="this.style.color='';"><strong>Resgistros</strong></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/create/task/" style="font-family: Verdana, Geneva, Tahoma, sans-serif; font-size: 20px; margin-right: 30px; color: black; transition: color .18s ease;"onmouseover="this.style.color='green';"onmouseout="this.style.color='';"><strong>Resgistrar datos</strong></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/logout" style="font-family: Verdana, Geneva, Tahoma, sans-serif; font-size: 20px; margin-right: 30px; color: black; transition: color .18s ease;"onmouseover="this.style.color='green';"onmouseout="this.style.color='';"><strong>Cerrar sesión</strong></a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="/signup" style="font-family: Verdana, Geneva, Tahoma, sans-serif; font-size: 20px; margin-right: 30px; color: black; transition: color .18s ease;"onmouseover="this.style.color='green';"onmouseout="this.style.color='';"><strong>Registrate</strong></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/signin" style="font-family: Verdana, Geneva, Tahoma, sans-serif; font-size: 20px; margin-right: 30px; color: black; transition: color .18s ease;"onmouseover="this.style.color='green';"onmouseout="this.style.color='';"><strong>Iniciar sesión</strong></a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>


    {% block content %}
    {% endblock %}

</body>

</html>
