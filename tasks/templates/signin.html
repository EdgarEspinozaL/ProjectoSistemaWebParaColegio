{% extends 'base.html' %}
{% load static %} 

{% block content %}


<style>
  body {
    background-image: url("{% static 'images/log.jpg' %}");
    background-repeat: no-repeat; 
    background-size: cover;
    background-position: center; 
    background-attachment: fixed;
  }
</style>
<main class="container">
    <div class="row">
        <section class="col-md-4 offset-md-4 mt-5">
            <form action="/signin/" method="POST" class="card card-body" style="background: linear-gradient(135deg,rgba(253, 229, 176, 0.658) 0%, #ffffffb6 100%);">
                <div class="login-header" style="text-align: center;">
                    <img src="{% static 'images/imagen.png' %}" alt="Logo Colegio San Felipe" width="200" height="200">
                </div>
                <h1 class="text-center"> I.E. Santísima Virgen De Guadalupe </h1>
                &nbsp;
                <h3 class="text-center"> Iniciar sesión </h3>
                &nbsp;
                {{error}}
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username">Nombre de usuario:</label>
                    <input type="text" name="username" id="username" class="form-control"
                        placeholder="Escribe tu nombre de usuario">
                </div>

                <div class="mb-3">
                    <label for="password">Contraseña:</label>
                    <input type="password" name="password" id="password" class="form-control"
                        placeholder="Escribe tu contraseña">
                </div>

                <button class="btn" style="background-color: #1fa657; color:black">
                    ¡Inicia Sesion!
                </button>
                &nbsp;
                <div class="forgot-password text-center">
                    <a href="/reset-password/">Olvidó su contraseña</a>
                </div>
            </form>
        </section>
    </div>
</main>
{% endblock %}
