{% extends 'base.html' %}
{% load static %} 
{% block content %}

<style>
  body {
    background-image: url("{% static 'images/registrar1.jpg' %}");
    background-repeat: no-repeat; 
    background-size: cover;
    background-position: center; 
    background-attachment: fixed;
  }
</style>

<main class="container">
    <div class="row">
        <div class="col-md-4 offset-md-4 mt-5">
            <form method="POST" class="card card-body" style="background: linear-gradient(135deg,rgba(253, 229, 176, 0.541) 0%, #ffffff5d 100%);">
                <div class="login-header" style="text-align: center;">
                    <img src="{% static 'images/imagen.png' %}" alt="Logo Colegio San Felipe" width="200" height="200">
                </div>
                <h1 class="text-center">Formulario de registro</h1>
                &nbsp;
                {{error}}
                {% csrf_token %}

                <div class="mb-3">
                    <label for="username">Nombre de usuario:</label>
                    <input type="text" name="username" id="username" class="form-control"
                    placeholder="Escribe tu nombre de usuario">
                </div>

                <div class="mb-3">
                    <label for="password1">Contraseña:</label>
                    <input type="password" name="password1" id="password1" class="form-control"
                    placeholder="Escribe tu contraseña">
                </div>

                <div class="mb-3">
                    <label for="password2">Confirma tu contraseña:</label>
                    <input type="password" name="password2" id="password2" class="form-control"
                        placeholder="Confirma tu contraseña">
                </div>
                &nbsp;
                <button class="btn" style="background-color: #1fa657; color:black">
                    ¡Registrate!
                </button>
            </form>
        </div>
    </div>
</main>

{% endblock %}
